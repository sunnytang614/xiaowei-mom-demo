<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小微故事 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* iPhone 外框 */
.iphone-frame {
  width: 390px;
  height: 844px;
  background: #000;
  border-radius: 54px;
  padding: 12px;
  box-shadow: 
    0 0 0 2px #333,
    0 0 0 4px #1a1a1a,
    0 50px 100px rgba(0,0,0,0.5),
    0 0 80px rgba(7,193,96,0.1);
  position: relative;
}

/* 屏幕区域 */
.iphone-screen {
  width: 100%;
  height: 100%;
  background: #fff;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
}

/* 灵动岛 */
.dynamic-island {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 37px;
  background: #000;
  border-radius: 20px;
  z-index: 1000;
}

/* 状态栏 */
.status-bar {
  background: #fff;
  padding: 46px 24px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
}

.status-bar .time { letter-spacing: 0.5px; }
.status-bar .icons { display: flex; gap: 5px; align-items: center; }
.status-bar .icon { font-size: 14px; }

/* 标题栏 */
.header {
  background: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid #e5e5e5;
}

.back-btn { font-size: 24px; color: #576b95; cursor: pointer; font-weight: 300; }
.header-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
.header-action { font-size: 20px; color: #576b95; }

/* 内容区 - 使用iframe */
.content-frame {
  width: 100%;
  height: calc(100% - 46px);
  overflow: hidden;
}

.content-frame iframe {
  width: 420px;
  height: 100%;
  border: none;
  transform-origin: top left;
  transform: scale(0.928);
}

/* 底部指示条 */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: #000;
  border-radius: 3px;
  z-index: 1000;
}

/* 侧边按钮 */
.side-buttons {
  position: absolute;
  left: -3px;
  top: 180px;
}

.side-btn {
  width: 3px;
  height: 30px;
  background: #333;
  border-radius: 0 2px 2px 0;
  margin-bottom: 8px;
}

.side-btn.silent { height: 50px; }
.side-btn.volume-up { height: 50px; top: 130px; }
.side-btn.volume-down { height: 50px; top: 185px; }
.side-btn.power { height: 80px; top: 280px; }

/* 品牌标识 */
.brand {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="iphone-frame">
  <div class="side-buttons">
    <div class="side-btn silent"></div>
    <div class="side-btn volume-up"></div>
    <div class="side-btn volume-down"></div>
    <div class="side-btn power"></div>
  </div>
  
  <div class="iphone-screen">
    <div class="dynamic-island"></div>
    
    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons">
        <span class="icon">📶</span>
        <span class="icon">🔋</span>
      </div>
    </div>
    
    <!-- 标题栏 -->
    <div class="header">
      <div class="back-btn">‹</div>
      <div class="header-title">小微</div>
      <div class="header-action">···</div>
    </div>
    
    <!-- 内容区 -->
    <div class="content-frame">
      <iframe src="xiaowei_mom_demo.html" id="demoFrame"></iframe>
    </div>
    
    <div class="home-indicator"></div>
  </div>
</div>

<div class="brand">小微 · 让连接更有温度</div>

</body>
</html>
